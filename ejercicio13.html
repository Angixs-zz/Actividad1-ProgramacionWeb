<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Votar o No votar</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>
    <div class="contenedor">
        <h1 class="titulo">¿Usted puede votar? Prueba aqui</h1>

        <form class=" formulario">
            <div class="campo">
                <label for="edad">Ingrese su edad:</label>
                <input
                    type="number"
                    id="edad"
                    name="edad"
                    class="entrada"
                    placeholder="Ejemplo: 23">
            </div>

            <button 
                class="boton"
                type="button"
                id="botonConvertir"
                name="botonConvertir"> Verificar edad
            </button>

            <div class="campo">
                <label for="Resultado"> Resultado: </label>
                <input
                    type="text"
                    id="resultado"
                    name="resultado"
                    class="entrada"
                    readonly>
            </div>

        </form>

        <div></div>

    </div>
    <script src="js/ejercicio13.js"></script>
</body>
</html>
