<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16</title>
    <link rel="stylesheet" href="css/ejercicio16.css">
</head>
<body>
    <div class="contenedor">
        <h1 class="titulo">Calculadora de operaciones básicas</h1>

        <form class="formulario">
            <div class="campo">
                <label for="numero1">Ingrese el primer número:</label>
                <input
                    type="number"
                    id="numero1"
                    name="numero1"
                    class="entrada"
                    placeholder="Ej: 10">
            </div>

            <div class="campo">
                <label for="numero2">Ingrese el segundo número:</label>
                <input
                    type="number"
                    id="numero2"
                    name="numero2"
                    class="entrada"
                    placeholder="Ej: 5">
            </div>

            <button
                class="boton"
                type="button"
                id="botonSumar"
                name="botonSumar">
                Sumar
            </button>

            <button
                class="boton"
                type="button"
                id="botonRestar"
                name="botonRestar">
                Restar
            </button>

            <button
                class="boton"
                type="button"
                id="botonMultiplicar"
                name="botonMultiplicar">
                Multiplicar
            </button>

            <button
                class="boton"
                type="button"
                id="botonDividir"
                name="botonDividir">
                Dividir
            </button>

            <div class="campo">
                <label for="resultado">Resultado:</label>
                <input
                    type="text"
                    id="resultado"
                    name="resultado"
                    class="entrada"
                    readonly>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio16.js"></script>
</body>
</html>
