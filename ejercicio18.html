<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulacion del DOM</title>

    <!-- aqui se agrega bootstrap para usar sus estilos y clases ya hechas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- bg-light le da un color claro al fondo de la pagina -->
<body class="bg-light">

    <!-- container centra el contenido y mt-5 agrega espacio en la parte superior -->
    <div class="container mt-5">

        <!-- card crea una tarjeta y shadow le da sombra -->
        <div class="card shadow">

            <!-- encabezado de la tarjeta con fondo azul, texto blanco y centrado -->
            <div class="card-header bg-primary text-white text-center">
                <h1>Agregar y eliminar elementos</h1>
            </div>

            <!-- cuerpo de la tarjeta donde estara el formulario y la lista -->
            <div class="card-body">

                <!-- texto breve para indicar que debe hacer el usuario -->
                <p class="text-center">
                    Escribe un elemento y agregalo a la lista.
                </p>

                <!-- grupo del campo de texto con margen inferior -->
                <div class="mb-3">

                    <!-- etiqueta que indica para que sirve el input -->
                    <label for="nuevoElemento" class="form-label">Nuevo elemento:</label>

                    <!-- campo donde el usuario escribe el elemento que quiere agregar -->
                    <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe algo">
                </div>

                <!-- contenedor para que el boton ocupe todo el ancho disponible -->
                <div class="d-grid mb-3">

                    <!-- boton que al presionarlo agregara el elemento a la lista usando javascript -->
                    <button type="button" id="botonAgregar" class="btn btn-success">
                        Agregar
                    </button>
                </div>

                <!-- lista donde se van a mostrar los elementos agregados desde javascript -->
                <ul id="lista" class="list-group"></ul>
            </div>
        </div>
    </div>

    <!-- aqui se conecta el archivo javascript que tiene la logica del ejercicio -->
    <script src="js/ejercicio18.js"></script>
</body>
</html>
